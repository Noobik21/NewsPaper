{% extends 'default.html' %}
{% load custom_filters %}
{% block content %}

    {% for post in news %}
        <h2>
            <a href = "{{ post.id }}">{{ post. title|censor }}</a>
        </h2>
        <p>{{ post.created|date:"d.m.Y" }}</p>
        <p>{{ post.text|truncatechars:20 }}</p>
        <hr>
    {% endfor %}

{% endblock %}
